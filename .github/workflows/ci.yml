name: 首版质量门禁

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-v1:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: 安装前端依赖
        run: npm ci
      - name: 检查本地离线边界
        run: npm run check:local-only
      - name: 检查中文 UI 契约
        run: npm run check:ui-contract
      - name: 检查 TypeScript
        run: npm run typecheck
      - name: 运行前端测试
        run: npm test
      - name: 运行 Rust 测试
        run: cargo test --workspace
      - name: 运行 Rust 静态检查
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: 构建生产前端
        run: npm run build
      - name: 构建 macOS 应用
        run: npm run build:app
